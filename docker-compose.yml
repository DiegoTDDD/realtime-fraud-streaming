name: realtime-fraud-streaming

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:19092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
    ports:
      - "19092:19092"   # Kafka API (host -> Redpanda) used by producer and Spark
      - "8081:8081"     # Schema Registry
      - "8082:8082"     # REST proxy
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  console:
    image: redpandadata/console:v2.7.2
    container_name: redpanda-console
    depends_on:
      - redpanda
    ports:
      - "8080:8080"     # Web UI -> open http://localhost:8080
    environment:
      KAFKA_BROKERS: redpanda:29092
